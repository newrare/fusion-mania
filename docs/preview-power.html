<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Power Icons</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background-image:url('../public/assets/images/background_one_rock.png');
  background-size:cover;
  background-position:center;
  min-height:100vh;
  padding:2.5rem 2rem;
  display:flex;
  flex-direction:column;
  gap:2.5rem;
  align-items:center;
}

.group{
  display:flex;
  flex-wrap:wrap;
  gap:2rem;
  justify-content:center;
}

.icon-set{
  display:flex;
  flex-direction:column;
  gap:.5rem;
  align-items:center;
}

.tiny-row{
  display:flex;
  gap:3px;
  align-items:center;
  margin-top:2px;
}

.dot{
  display:flex;
  align-items:center;
  justify-content:center;
  width:52px;
  height:52px;
  border-radius:50%;
  position:relative;
  background:var(--bg,transparent);
}

.dot.tiny{
  width:28px;
  height:28px;
}
.dot.tiny::before{
  border-width:2px;
}
.dot.tiny .icon-svg{
  width:50%;
  height:50%;
}

/* Only ::before rotates — the .dot element itself never rotates */
.dot::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:50%;
  border:3.5px dashed var(--ring,transparent);
  animation:spin var(--dur,8s) linear infinite;
}

/* Icon is static — no animation on it */
.icon-svg{
  width:52%;
  height:52%;
  display:block;
  color:var(--ico,#888);
  position:relative;
  z-index:1;
}

/* info — blue pastel bg, blue ring & icon, slow 14s */
.dot.info   {--ring:#3b82f6;--ico:#1d4ed8;--bg:rgba(219,234,254,.82);--dur:14s}
/* warning — amber pastel bg, amber ring & icon, medium 8s */
.dot.warning{--ring:#f59e0b;--ico:#b45309;--bg:rgba(254,243,199,.82);--dur:8s}
/* danger — red pastel bg, red ring & icon, fast 4s */
.dot.danger {--ring:#ef4444;--ico:#b91c1c;--bg:rgba(254,226,226,.82);--dur:4s}

/* off — neutral grey bg, very slow ring on hover */
.dot.off{--ring:#9ca3af;--ico:#6b7280;--bg:rgba(243,244,246,.75)}
.dot.off::before{animation:spinSlow 24s linear infinite;animation-play-state:paused}
.dot.off:hover{--ring:#6b7280;--ico:#374151;cursor:pointer}
.dot.off:hover::before{animation-play-state:running}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
</style>
</head>
