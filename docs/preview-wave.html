<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FusionMania — Preview · Liquid Wave Cards</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0d18;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  padding: 48px 24px 80px;
  overflow-x: hidden;
}

h1 {
  text-align: center;
  font-size: 2rem;
  color: #c8aaff;
  margin-bottom: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow: 0 0 24px rgba(180, 120, 255, 0.5);
}

.subtitle {
  text-align: center;
  color: #6677aa;
  margin-bottom: 64px;
  font-size: 0.82rem;
  letter-spacing: 1px;
}

/* ── Grid of cards ───────────────────────────────────────── */
.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
  justify-content: center;
  max-width: 1100px;
  margin: 0 auto;
}

/* ── Base card ───────────────────────────────────────────── */
.card {
  position: relative;
  width: 180px;
  height: 180px;
  border-radius: 22px;
  overflow: hidden;
  cursor: pointer;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255,255,255,0.06);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.25s ease;
}

.card:hover {
  transform: scale(1.08) translateY(-4px);
}

/* ── Canvas fills the card ───────────────────────────────── */
.card canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── Wave layers (CSS rotating-ellipse technique) ────────── */
.wave-body {
  position: absolute;
  inset: 0;
  border-radius: 22px;
}

.wave-body::before,
.wave-body::after {
  content: '';
  position: absolute;
  border-radius: 40%;
}

/* sizes & offsets: bigger than card so they spill over */
.wave-body::before {
  width: 220%;
  height: 220%;
  left: -60%;
}

.wave-body::after {
  width: 230%;
  height: 230%;
  left: -65%;
  opacity: 0.55;
}

/* ── Label ───────────────────────────────────────────────── */
.card-label {
  position: absolute;
  bottom: 12px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.90);
  text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  z-index: 10;
  pointer-events: none;
}

/* ── Shimmer overlay ─────────────────────────────────────── */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.12) 0%,
    transparent 50%,
    rgba(0,0,0,0.08) 100%
  );
  border-radius: 22px;
  pointer-events: none;
  z-index: 5;
}

/* ══════════════════════════════════════════════════════════
   CARD THEMES
   ══════════════════════════════════════════════════════════ */

/* 1 · Abyssal Ocean */
.card-1 { background: #051a3a; }
.card-1 .wave-body {
  background: linear-gradient(180deg, #0a4a8a 0%, #051a3a 100%);
}
.card-1 .wave-body::before {
  background: rgba(30, 130, 220, 0.45);
  top: -140%;
  animation: wave-spin 7s linear infinite;
}
.card-1 .wave-body::after {
  background: rgba(0, 80, 180, 0.35);
  top: -145%;
  animation: wave-spin 11s linear infinite reverse;
}

/* 2 · Magma Core */
.card-2 { background: #1a0500; }
.card-2 .wave-body {
  background: linear-gradient(180deg, #c23000 0%, #1a0500 100%);
}
.card-2 .wave-body::before {
  background: rgba(255, 80, 10, 0.50);
  top: -138%;
  animation: wave-spin 6s linear infinite;
}
.card-2 .wave-body::after {
  background: rgba(200, 40, 0, 0.40);
  top: -143%;
  animation: wave-spin 9s linear infinite reverse;
}

/* 3 · Toxic Swamp */
.card-3 { background: #041205; }
.card-3 .wave-body {

}

}
.card-3 .wave-body::after {

  top: -142%;
  animation: wave-spin 13s linear infinite reverse;
}

/* 4 · Arcane Potion */
.card-4 { background: #120420; }
.card-4 .wave-body {
  background: linear-gradient(180deg, #6a10c8 0%, #120420 100%);
}
.card-4 .wave-body::before {

  top: -139%;
  animation: wave-spin 9s linear infinite;
}
.card-4 .wave-body::after {
  background: rgba(100, 0, 200, 0.40);
  top: -144%;
  animation: wave-spin 14s linear infinite reverse;
}

/* 5 · Golden Honey */
.card-5 { background: #1a1000; }
.card-5 .wave-body {
  background: linear-gradient(180deg, #c87a00 0%, #1a1000 100%);
}
.card-5 .wave-body::before {

  top: -137%;
  animation: wave-spin 10s linear infinite;
}
.card-5 .wave-body::after {
  background: rgba(200, 120, 0, 0.38);
  top: -143%;
  animation: wave-spin 15s linear infinite reverse;
}

/* 6 · Frozen Abyss */
.card-6 { background: #021218; }
.card-6 .wave-body {
  background: linear-gradient(180deg, #0890b8 0%, #021218 100%);
}
.card-6 .wave-body::before {
  background: rgba(60, 210, 240, 0.48);
  top: -140%;
  animation: wave-spin 12s linear infinite;
}
.card-6 .wave-body::after {

  top: -146%;
  animation: wave-spin 7s linear infinite reverse;
}

/* 7 · Blood Moon */
.card-7 { background: #150005; }
.card-7 .wave-body {
  background: linear-gradient(180deg, #8a0020 0%, #150005 100%);
}
.card-7 .wave-body::before {

  animation: wave-spin 5.5s linear infinite;
}
.card-7 .wave-body::after {

  top: -144%;
  animation: wave-spin 8.5s linear infinite reverse;
}

/* 8 · Neon Citrus */

.card-8 .wave-body {
  background: linear-gradient(180deg, #5a9a00 0%, #0a1000 100%);
}
.card-8 .wave-body::before {
  background: rgba(160, 255, 0, 0.46);
  top: -135%;
  animation: wave-spin 11s linear infinite;
}
.card-8 .wave-body::after {
  background: rgba(100, 200, 0, 0.34);
  top: -141%;
  animation: wave-spin 16s linear infinite reverse;
}

/* 9 · Void Matter */
.card-9 { background: #060616; }
.card-9 .wave-body {
  background: linear-gradient(180deg, #1a0a5a 0%, #060616 100%);
}
.card-9 .wave-body::before {
  background: rgba(80, 40, 180, 0.48);
  top: -142%;
  animation: wave-spin 13s linear infinite;
}
.card-9 .wave-body::after {
  background: rgba(40, 10, 120, 0.36);
  top: -148%;
  animation: wave-spin 18s linear infinite reverse;
}

/* 10 · Plasma Storm */
.card-10 { background: #180d00; }
.card-10 .wave-body {
  background: linear-gradient(180deg, #c05000 0%, #180d00 100%);
}
.card-10 .wave-body::before {
  background: rgba(255, 120, 0, 0.50);
  top: -136%;
  animation: wave-spin 4.5s linear infinite;
}
.card-10 .wave-body::after {
  background: rgba(200, 60, 0, 0.40);
  top: -142%;
  animation: wave-spin 7s linear infinite reverse;
}

/* ── Keyframe ────────────────────────────────────────────── */
@keyframes wave-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── Bubble particles ────────────────────────────────────── */
.bubble {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  z-index: 4;
  animation: bubble-rise var(--dur, 3s) ease-in var(--delay, 0s) infinite;
}

@keyframes bubble-rise {
  0%   { transform: translateY(0) scale(1);   opacity: 0; }
  10%  { opacity: 0.55; }
  80%  { opacity: 0.30; }
  100% { transform: translateY(-190px) scale(0.6); opacity: 0; }
}
</style>
</head>
<body>

<h1>Liquid Wave</h1>
<p class="subtitle">10 variantes de fond liquide animé — CSS + Canvas</p>

<div class="cards">

  <div class="card card-1" data-color1="#1e82dc" data-color2="#0a4a8a" data-label="Abyssal Ocean">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Abyssal Ocean</span>
  </div>

  <div class="card card-2" data-color1="#ff500a" data-color2="#c23000" data-label="Magma Core">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Magma Core</span>
  </div>

  <div class="card card-3" data-color1="#32d214" data-color2="#1a7a0a" data-label="Toxic Swamp">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Toxic Swamp</span>
  </div>

  <div class="card card-4" data-color1="#a028ff" data-color2="#6a10c8" data-label="Arcane Potion">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Arcane Potion</span>
  </div>

  <div class="card card-5" data-color1="#ffb400" data-color2="#c87a00" data-label="Golden Honey">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Golden Honey</span>
  </div>

  <div class="card card-6" data-color1="#3cd2f0" data-color2="#0890b8" data-label="Frozen Abyss">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Frozen Abyss</span>
  </div>

  <div class="card card-7" data-color1="#dc143c" data-color2="#8a0020" data-label="Blood Moon">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Blood Moon</span>
  </div>

  <div class="card card-8" data-color1="#a0ff00" data-color2="#5a9a00" data-label="Neon Citrus">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Neon Citrus</span>
  </div>

  <div class="card card-9" data-color1="#5028b4" data-color2="#1a0a5a" data-label="Void Matter">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Void Matter</span>
  </div>

  <div class="card card-10" data-color1="#ff7800" data-color2="#c05000" data-label="Plasma Storm">
    <div class="wave-body"></div>
    <canvas></canvas>
    <span class="card-label">Plasma Storm</span>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────
//  Liquid Wave  —  Canvas layer (sine-wave surface + glow)
// ─────────────────────────────────────────────────────────

const CARD_SIZE  = 180;
const WAVE_ROWS  = 2;          // layered sine waves per card
const FPS_LIMIT  = 60;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

class LiquidCard {
  constructor(card) {
    this.card     = card;
    this.canvas   = card.querySelector('canvas');
    this.ctx      = this.canvas.getContext('2d');
    this.c1       = hexToRgb(card.dataset.color1);
    this.c2       = hexToRgb(card.dataset.color2);
    this.t        = Math.random() * Math.PI * 2;  // random phase start
    this.speed    = 0.006 + Math.random() * 0.006;
    this.level    = 0.44 + Math.random() * 0.14;  // fill level 44-58%
    this.waves    = Array.from({ length: WAVE_ROWS }, (_, i) => ({
      amp    : 6 + Math.random() * 8,
      freq   : 0.018 + Math.random() * 0.012,
      phase  : Math.random() * Math.PI * 2,
      speed  : (i === 0 ? 1 : -0.7) * (0.8 + Math.random() * 0.5),
      alpha  : i === 0 ? 0.90 : 0.50,
    }));

    // bubbles
    this.bubbles  = Array.from({ length: 6 }, () => this._newBubble(true));

    this._resize();
  }

  _resize() {
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width  = CARD_SIZE * dpr;
    this.canvas.height = CARD_SIZE * dpr;
    this.canvas.style.width  = CARD_SIZE + 'px';
    this.canvas.style.height = CARD_SIZE + 'px';
    this.ctx.scale(dpr, dpr);
    this.W = CARD_SIZE;
    this.H = CARD_SIZE;
  }

  _newBubble(init = false) {
    return {
      x    : 10 + Math.random() * (CARD_SIZE - 20),
      y    : init ? Math.random() * CARD_SIZE : CARD_SIZE + 10,
      r    : 1.5 + Math.random() * 4,
      vy   : 0.3 + Math.random() * 0.7,
      life : 0,
    };
  }

  _surfaceY(x, waveIndex) {
    const w = this.waves[waveIndex];
    const baseY = this.H * (1 - this.level);
    return baseY + Math.sin(x * w.freq + this.t * w.speed + w.phase) * w.amp;
  }

  draw() {
    const { ctx, W, H, c1, c2 } = this;
    ctx.clearRect(0, 0, W, H);

    // ── draw each wave layer back-to-front ──────────────
    for (let wi = WAVE_ROWS - 1; wi >= 0; wi--) {
      const w = this.waves[wi];

      // build path along the wave then down to bottom corners
      ctx.beginPath();
      ctx.moveTo(0, this._surfaceY(0, wi));
      for (let x = 1; x <= W; x++) {
        ctx.lineTo(x, this._surfaceY(x, wi));
      }
      ctx.lineTo(W, H);
      ctx.lineTo(0, H);
      ctx.closePath();

      // gradient fill
      const g = ctx.createLinearGradient(0, this._surfaceY(W / 2, wi), 0, H);
      const alpha = w.alpha;
      g.addColorStop(0, `rgba(${c1.r},${c1.g},${c1.b},${alpha})`);
      g.addColorStop(1, `rgba(${c2.r},${c2.g},${c2.b},${(alpha * 0.7).toFixed(2)})`);
      ctx.fillStyle = g;
      ctx.fill();

      // surface highlight line
      ctx.beginPath();
      ctx.moveTo(0, this._surfaceY(0, wi));
      for (let x = 1; x <= W; x++) {
        ctx.lineTo(x, this._surfaceY(x, wi));
      }
      ctx.strokeStyle = `rgba(255,255,255,${(0.25 * alpha).toFixed(2)})`;
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }

    // ── bubbles ─────────────────────────────────────────
    for (const b of this.bubbles) {
      const maxY  = this._surfaceY(b.x, 0);
      b.y  -= b.vy;
      b.life++;

      if (b.y < maxY - b.r) {
        Object.assign(b, this._newBubble());
        continue;
      }

      const dist   = Math.max(0, (H - b.y) / H);   // 0 at top, 1 at bottom
      const opacity = Math.min(dist * 3, 0.55);

      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${opacity.toFixed(2)})`;
      ctx.lineWidth   = 0.8;
      ctx.stroke();

      // tiny highlight
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${(opacity * 0.8).toFixed(2)})`;
      ctx.fill();
    }

    // ── glimmer on top ───────────────────────────────────
    const glimmer = ctx.createRadialGradient(W * 0.35, H * 0.25, 0, W * 0.5, H * 0.4, W * 0.6);
    glimmer.addColorStop(0, 'rgba(255,255,255,0.10)');
    glimmer.addColorStop(1, 'rgba(255,255,255,0.00)');
    ctx.fillStyle = glimmer;
    ctx.fillRect(0, 0, W, H);
  }

  tick(dt) {
    this.t += this.speed * dt;
    this.draw();
  }
}

// ── Init all cards ─────────────────────────────────────────
const cards = Array.from(document.querySelectorAll('.card')).map(
  (el) => new LiquidCard(el)
);

// ── RAF loop ───────────────────────────────────────────────
let last = 0;
const MS_PER_FRAME = 1000 / FPS_LIMIT;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = ts - last;
  if (dt < MS_PER_FRAME) return;
  last = ts - (dt % MS_PER_FRAME);
  for (const c of cards) c.tick(dt);
}

requestAnimationFrame(loop);

// ── Hover: accelerate wave ─────────────────────────────────
document.querySelectorAll('.card').forEach((el, i) => {
  const card = cards[i];
  el.addEventListener('mouseenter', () => { card.speed *= 3.5; });
  el.addEventListener('mouseleave', () => { card.speed /= 3.5; });
});
</script>
</body>
</html>
