<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FusionMania — Power Tiles</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
  padding: 36px 20px 64px;
  min-height: 100vh;
  background: linear-gradient(160deg, #f2e8ff, #e8f2ff, #efffee);
}

/* ═══════════════════════════════════════
   FLIP CORE
═══════════════════════════════════════ */
.flip-scene {
  width: 74px;
  height: 74px;
  perspective: 300px;
  flex-shrink: 0;
}
.flip-card {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: flipY 8s ease-in-out infinite;
  animation-delay: var(--d, 0s);
}
@keyframes flipY {
  0%,  62.5%  { transform: rotateY(0deg);   }
  75%, 87.5%  { transform: rotateY(180deg); }
  100%        { transform: rotateY(0deg);   }
}
.flip-front, .flip-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid transparent;
  font-family: 'Comic Sans MS', cursive;
  font-weight: 900; font-size: 1.45rem;
  overflow: hidden;
  box-shadow: 0 5px 16px rgba(0,0,0,0.28);
}
.flip-back { transform: rotateY(180deg); }

/* ═══════════════════════════════════════
   FRONT FACE
═══════════════════════════════════════ */
.fval { line-height: 1; }

/* Small power hint: icon + name, bottom centre */
.pwr-hint {
  position: absolute;
  bottom: 4px; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center; gap: 2px;
  white-space: nowrap; pointer-events: none;
}
.pwr-hint svg { width: 9px; height: 9px; flex-shrink: 0; opacity: 0.7; }
.pwr-hint span {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 0.41rem; font-weight: 800;
  letter-spacing: 0.3px; text-transform: uppercase;
  line-height: 1; opacity: 0.65;
}

/* ═══════════════════════════════════════
   BACK FACE — power group colours
═══════════════════════════════════════ */
.pw-danger  { background: #ef4444; color: #fff; border-color: #991b1b; }
.pw-warning { background: #f59e0b; color: #fff; border-color: #92400e; }
.pw-info    { background: #3b82f6; color: #fff; border-color: #1e40af; }

/* Radial highlight */
.pw-danger::before, .pw-warning::before, .pw-info::before {
  content: '';
  position: absolute; inset: 0; border-radius: 12px;
  background: radial-gradient(circle at 38% 32%, rgba(255,255,255,0.18), transparent 65%);
  z-index: 1; pointer-events: none;
}

.back-ico {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 2;
}
.back-ico svg {
  width: 100%; height: 100%;
  color: #fff;
  animation: icoGlow 2s ease-in-out infinite alternate;
}
.pw-danger  .back-ico svg { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
.pw-warning .back-ico svg { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
.pw-info    .back-ico svg { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
@keyframes icoGlow {
  from { opacity: 0.88; }
  to   { opacity: 1;    }
}

/* Value reminder, bottom right of back */
.bval {
  position: absolute;
  bottom: 5px; right: 5px;
  font-family: 'Comic Sans MS', cursive;
  font-weight: 900; font-size: 0.65rem;
  opacity: 0.72; white-space: nowrap; z-index: 3;
}

/* ═══════════════════════════════════════
   THEME: CANDY FLOAT
═══════════════════════════════════════ */
.theme-cf {
  background: linear-gradient(160deg, #f2e8ff, #e8f2ff, #efffee);
  border-radius: 28px; padding: 22px;
  box-shadow: 0 8px 32px rgba(140,80,200,0.18);
}
.theme-cf .grid-wrap {
  display: grid; grid-template-columns: repeat(4, 74px); gap: 10px;
  padding: 14px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: 20px;
}

.cf-t4   { background: #ffe5fd; color: #c02ea8; border-color: #c02ea8; }
.cf-t8   { background: #ffd6f5; color: #aa0f96; border-color: #aa0f96; }
.cf-t16  { background: #ffcaff; color: #8800b8; border-color: #8800b8; }
.cf-t32  { background: #edd2ff; color: #6600cc; border-color: #6600cc; }
.cf-t64  { background: #dcc2ff; color: #4400e0; border-color: #4400e0; font-size: 1.18rem; }
.cf-t128 { background: linear-gradient(135deg,#c8b8ff,#a898ff); color: #1a00cc; border-color: #1a00cc; font-size: 1.05rem; }

/* ═══════════════════════════════════════
   THEME: CHROMA BURST
═══════════════════════════════════════ */
.theme-cb {
  background: linear-gradient(160deg, #110a1e, #0a0614, #0c0f20);
  border-radius: 28px; padding: 22px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}
.theme-cb .grid-wrap {
  display: grid; grid-template-columns: repeat(4, 74px); gap: 10px;
  padding: 14px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 20px;
}

.cb-t4   { background: #f97316; color: #fff; border-color: #9a3412; text-shadow: 0 1px 4px rgba(0,0,0,0.45); }
.cb-t8   { background: #ef4444; color: #fff; border-color: #991b1b; text-shadow: 0 1px 4px rgba(0,0,0,0.45); }
.cb-t16  { background: #a855f7; color: #fff; border-color: #6b21a8; text-shadow: 0 1px 4px rgba(0,0,0,0.45); }
.cb-t32  { background: #3b82f6; color: #fff; border-color: #1e40af; text-shadow: 0 1px 4px rgba(0,0,0,0.45); }
.cb-t64  { background: #06b6d4; color: #fff; border-color: #0e7490; text-shadow: 0 1px 4px rgba(0,0,0,0.45); font-size: 1.18rem; }
.cb-t128 { background: linear-gradient(135deg,#059669,#34d399); color: #fff; border-color: #065f46; text-shadow: 0 1px 4px rgba(0,0,0,0.45); font-size: 1.05rem; }

svg { display: block; }
</style>
