<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FusionMania — Preview · Destroy</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(160deg, #1a0a2e 0%, #0d0520 60%, #0a1030 100%);
  min-height: 100vh;
  font-family: 'Comic Sans MS', cursive, sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 52px;
  padding: 60px 20px;
}

h1 {
  font-size: 2.2rem;
  color: #ff6060;
  letter-spacing: 5px;
  text-shadow: 0 0 32px rgba(255, 70, 50, .75);
}

.duo {
  display: flex;
  gap: 48px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ── Tile base ─────────────────────────────────── */
.tile {
  width: 74px;
  height: 74px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 1.45rem;
  border: 2px solid transparent;
  box-shadow: 0 4px 14px rgba(0,0,0,.5);
}
.t4  { background: #ffe5fd; color: #c02ea8; border-color: #c02ea8; }
.t64 { background: #dcc2ff; color: #4400e0; border-color: #4400e0; }

/* ── Cards ─────────────────────────────────────── */
.card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 20px;
  padding: 32px 28px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  cursor: pointer;
  user-select: none;
  transition: border-color .2s;
}
.card:hover { border-color: rgba(255,90,70,.38); }

.label {
  font-size: .6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,160,140,.45);
}

/* ── Ejection wrapper (clips the flying tile) ─── */
.ecard {
  position: relative;
  width: 158px;
  height: 158px;
  overflow: hidden;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 20px;
  padding: 32px 28px 20px;
  cursor: pointer;
  transition: border-color .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 42px;
  gap: 0;
}
.ecard:hover { border-color: rgba(255,90,70,.38); }

.ecard .tile {
  position: absolute;
  top: 50%; left: 50%;
  margin: -37px 0 0 -37px;
}
.ecard .label {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}

/* ══════════════════════════════════════════════════
   ZAP  — 3 flashs blancs puis annihilation
   1.5s (version rapide)
   ══════════════════════════════════════════════════ */
@keyframes d-zap {
  0%,1%    { filter:brightness(1);             opacity:1; transform:scale(1); }
  8%       { filter:brightness(9) saturate(0); transform:scale(1.09); }
  15%      { filter:brightness(1);             transform:scale(.98); }
  22%      { filter:brightness(7) saturate(0); transform:scale(1.05); }
  29%      { filter:brightness(1);             opacity:1; }
  40%      { filter:brightness(5) saturate(0); opacity:.75; transform:scale(.92); }
  55%      { filter:brightness(14) saturate(0); transform:scale(.35); opacity:.1; }
  65%      { filter:brightness(0);             transform:scale(0); opacity:0; }
  65%,79%  { opacity:0; transform:scale(0); }
  79.9%    { opacity:0; }
  80%,100% { filter:brightness(1);             opacity:1; transform:scale(1); }
}
.d-zap { animation: d-zap 1.5s ease-in-out infinite; }

/* ══════════════════════════════════════════════════
   DIAGONAL ↗  — expulsion haut-droite 45°, spin 540°
   2.2s
   ══════════════════════════════════════════════════ */
@keyframes e-ne {
  0%,1%    { transform:translate(0,0) rotate(0deg) scale(1);              opacity:1; filter:brightness(1); }
  7%       { transform:translate(4px,5px) scale(1.2);                    filter:brightness(2.4) sepia(.5) saturate(2); }
  58%      { transform:translate(185px,-185px) rotate(540deg) scale(.38); opacity:.2; }
  64%      { transform:translate(230px,-230px) scale(0);                   opacity:0; }
  64%,74%  { opacity:0; transform:translate(230px,-230px) scale(0); }
  74.9%    { opacity:0; transform:translate(0,0) scale(0); }
  78%      { transform:translate(0,0) scale(1.12); opacity:1; filter:brightness(2.2); }
  79%,100% { transform:translate(0,0) scale(1); opacity:1; filter:brightness(1); }
}
.e-ne { animation: e-ne 2.2s cubic-bezier(.15,0,.65,1) infinite; }

</style>
</head>
<body>

<h1>DESTROY</h1>

<div class="duo">

  <!-- ZAP -->
  <div class="card" data-replay>
    <div class="tile t4 d-zap">4</div>
    <div class="label">Zap</div>
  </div>

  <!-- DIAGONAL ↗ -->
  <div class="ecard" data-replay>
    <div class="tile t64 e-ne" style="animation-delay:.5s">64</div>
    <div class="label">Diagonal ↗</div>
  </div>

</div>

<script>
document.querySelectorAll('[data-replay]').forEach(el => {
  el.addEventListener('click', () => {
    el.querySelectorAll('.tile').forEach(t => {
      t.style.animation = 'none';
      void t.offsetWidth;
      t.style.animation = '';
    });
  });
});
</script>

</body>
</html>
